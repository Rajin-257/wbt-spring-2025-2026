<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>My To-Do List</h2>
    <div class="input-group">
        <input type="text" id="taskInput" placeholder="Enter a new task...">
        <button onclick="addTask()">Add Task</button>
    </div>
    <p id="errorMessage" class="error">Task cannot be empty!</p>
    
    <ul id="taskList"></ul>
</div>

<script>
    const taskInput = document.getElementById('taskInput');
    const taskList = document.getElementById('taskList');
    const errorMessage = document.getElementById('errorMessage');

    function addTask() {
        const taskValue = taskInput.value.trim();
        
        // Form Validation: No empty tasks
        if (taskValue === "") {
            errorMessage.style.display = "block";
            errorMessage.innerText = "Task cannot be empty!";
            return;
        }

        // Challenge: Prevent duplicate tasks
        const existingTasks = Array.from(taskList.querySelectorAll('.task-text'))
            .map(span => span.innerText.toLowerCase());
        
        if (existingTasks.includes(taskValue.toLowerCase())) {
            errorMessage.style.display = "block";
            errorMessage.innerText = "Task already exists!";
            return;
        }

        errorMessage.style.display = "none";

        const li = document.createElement('li');

        // Task Text Span
        const span = document.createElement('span');
        span.innerText = taskValue;
        span.className = "task-text";
        
        // Style Manipulation: Mark completed by clicking
        span.onclick = function() {
            span.classList.toggle('completed');
        };

        // Edit Button
        const editBtn = document.createElement('button');
        editBtn.innerText = "Edit";
        editBtn.className = "edit-btn";
        editBtn.onclick = function() {
            const newText = prompt("Update your task:", span.innerText);
            if (newText !== null && newText.trim() !== "") {
                // Check if new text is a duplicate
                if (existingTasks.includes(newText.trim().toLowerCase()) && newText.trim().toLowerCase() !== span.innerText.toLowerCase()) {
                    alert("This task already exists!");
                } else {
                    span.innerText = newText.trim();
                }
            }
        };

        // Delete Button
        const deleteBtn = document.createElement('button');
        deleteBtn.innerText = "Delete";
        deleteBtn.className = "delete-btn";
        deleteBtn.onclick = function() {
            taskList.removeChild(li);
        };

        li.appendChild(span);
        li.appendChild(editBtn);
        li.appendChild(deleteBtn);
        taskList.appendChild(li);

        taskInput.value = "";
    }

    // Allow Enter key to add task
    taskInput.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            addTask();
        }
    });
</script>

</body>
</html>
